version: "3.8"

services: 
 db: 
  images: pgvector/pgvector:pg16
  environment: 
	POSTGRES_USER: postgres
	POSTGRES_PASSWORD: postgres
	POSTGRES_DB: investmentqa

 posts:
   - "5432:5432"
 volumes:
 - postgres_data:/var/lib/postgresql/data

web: 
 build: .  
 posts: 
 - "8080:8080"
 environment: 
-DATABASE_URL=postgresql://postgres:postgres@db:5432/investmentqa
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
